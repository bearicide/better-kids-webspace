<style>
:root{--line:rgba(255,255,255,.16)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 10%,rgba(34,211,238,.36),transparent 28%),radial-gradient(circle at 85% 70%,rgba(139,92,246,.32),transparent 34%),linear-gradient(135deg,#020617,#082f49,#1e1b4b);color:white;font-family:Arial,Helvetica,sans-serif;padding:0 14px}.wrap{width:min(1100px,100%);margin:0 auto}.top{position:sticky;top:0;background:rgba(0,0,0,.65);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}nav{display:flex;justify-content:space-between;align-items:center;padding:14px 0;gap:12px;flex-wrap:wrap}.links{display:flex;gap:8px;flex-wrap:wrap}a,button{border:1px solid var(--line);border-radius:999px;padding:12px 16px;background:rgba(255,255,255,.1);color:white;text-decoration:none;font-weight:1000;cursor:pointer}.hero{padding:50px 0 24px}.card{border:1px solid var(--line);border-radius:34px;background:rgba(0,0,0,.5);padding:clamp(24px,6vw,56px);box-shadow:0 0 70px rgba(34,211,238,.18)}h1{font-size:clamp(3rem,10vw,7rem);line-height:.88;margin:0 0 16px;font-weight:1000;background:linear-gradient(90deg,#22d3ee,#facc15,#a855f7,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase}.lead{font-size:clamp(1.15rem,3vw,1.6rem);color:#d4d4d8;font-weight:900;max-width:820px}.grid{display:grid;gap:18px}.two{grid-template-columns:repeat(2,1fr)}.three{grid-template-columns:repeat(3,1fr)}.panel{border:1px solid var(--line);border-radius:28px;background:rgba(0,0,0,.46);padding:22px}.panel h2{font-size:clamp(1.8rem,5vw,3rem);margin:0 0 14px;font-weight:1000}.bigbuttons{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.pad{min-height:120px;border-radius:24px;font-size:1.35rem;background:linear-gradient(135deg,rgba(34,211,238,.25),rgba(139,92,246,.28));border:2px solid rgba(255,255,255,.16)}.pad:active{transform:scale(.96)}.quest{font-size:1.2rem;font-weight:1000;min-height:88px;display:grid;place-items:center;text-align:center}.meter{height:20px;border-radius:999px;border:1px solid var(--line);overflow:hidden;background:rgba(255,255,255,.1)}.meter span{display:block;height:100%;width:66%;background:linear-gradient(90deg,#22d3ee,#22c55e,#facc15)}.footer{text-align:center;color:#cbd5e1;padding:30px 0;font-weight:900}@media(max-width:850px){.two,.three,.bigbuttons{grid-template-columns:1fr}h1{font-size:3rem}.pad{min-height:92px}}
</style>
</head>
<body>
<header class="top"><nav class="wrap"><div>🕹️ KAI'S ARCADE</div><div class="links"><a href="../">Hub</a><a href="../emme/">Emme</a></div></nav></header>
<main class="wrap"><section class="hero"><div class="card"><h1>Kai's Arcade Fortress</h1><p class="lead">Big-button arcade room with quests, monster controls, and loud fake machines.</p></div></section><section class="panel"><h2>🎮 Big Button Board</h2><div class="bigbuttons"><button class="pad" onclick="blast('🚀 Rocket launched!')">🚀 Rocket</button><button class="pad" onclick="blast('🐉 Monster awakened!')">🐉 Monster</button><button class="pad" onclick="blast('⚡ Power surge!')">⚡ Power</button><button class="pad" onclick="blast('👾 Pixel boss incoming!')">👾 Boss</button><button class="pad" onclick="blast('🎵 Beat pad armed!')">🎵 Beat</button><button class="pad" onclick="blast('🛡️ Shield online!')">🛡️ Shield</button></div></section><section class="grid two"><div class="panel"><h2>🎲 Arcade Quest</h2><div id="questBox" class="quest">Press roll to get a mission.</div><button onclick="rollQuest()">Roll Quest</button></div><div class="panel"><h2>🧠 Sneaky Learning Meter</h2><div class="meter"><span id="meter"></span></div><button onclick="boostMeter()">Boost</button></div></section></main><footer class="footer wrap">Kai's page · maximum safe chaos 🕹️</footer>
<script>
const quests=['Design a monster with three powers.','Invent a fake arcade game.','Draw a rocket powered by pizza.','Create a secret code.'];let power=66;function blast(msg){alert(msg)}function rollQuest(){questBox.textContent=quests[Math.floor(Math.random()*quests.length)]}function boostMeter(){power=Math.min(100,power+8);meter.style.width=power+'%';if(power>=100)alert('⚡ MAX POWER MODE!')}
</script>
