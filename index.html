<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Better Kids Webspace</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg,#050510,#120022,#001a1a);
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .card {
      max-width: 900px;
      padding: 48px;
      border-radius: 32px;
      background: rgba(0,0,0,.6);
      border: 2px solid rgba(255,255,255,.15);
      backdrop-filter: blur(12px);
      text-align: center;
      box-shadow: 0 0 50px rgba(0,255,255,.15);
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 12px;
      background: linear-gradient(90deg,#00ffff,#ffff66,#00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.3rem;
      color: #d4d4d8;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 32px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 18px 28px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: .2s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    .emme {
      background: #22d3ee;
      color: black;
    }

    .kai {
      background: #a855f7;
      color: white;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🌈 BETTER KIDS WEBSPACE 🌈</h1>
    <p>
      Loud colors. Big buttons. Safe chaos. Creative weirdness for Kai + Emme.
    </p>

    <div class="buttons">
      <button class="emme">🎨 EMME'S STUDIO</button>
      <button class="kai">🕹️ KAI'S ARCADE</button>
    </div>
  </div>
</body>
</html>
