<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emme's Studio | Better Kids Webspace</title>
  <style>
    :root{--cyan:#22d3ee;--green:#22c55e;--yellow:#facc15;--line:rgba(255,255,255,.15);--muted:#cbd5e1}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 10%,rgba(34,211,238,.22),transparent 30%),radial-gradient(circle at 85% 70%,rgba(34,197,94,.14),transparent 32%),linear-gradient(135deg,#020617,#111827,#18181b);color:white;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}
    .wrap{width:min(1120px,calc(100% - 28px));margin:0 auto}.top{position:sticky;top:0;z-index:5;background:rgba(0,0,0,.65);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    nav{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 0;flex-wrap:wrap}.brand{font-weight:1000;letter-spacing:.08em}.links{display:flex;gap:8px;flex-wrap:wrap}a,button{border:1px solid var(--line);border-radius:999px;padding:11px 15px;background:rgba(255,255,255,.08);color:white;text-decoration:none;font-weight:900;cursor:pointer}a:hover,button:hover{background:rgba(255,255,255,.16);transform:translateY(-1px)}
    .hero{padding:58px 0 28px}.card{border:1px solid var(--line);border-radius:34px;background:rgba(0,0,0,.52);box-shadow:0 0 60px rgba(34,211,238,.12);padding:clamp(24px,6vw,56px)}
    h1{font-size:clamp(3rem,9vw,6.5rem);line-height:.9;margin:0 0 16px;font-weight:1000;background:linear-gradient(90deg,#e2e8f0,#22d3ee,#22c55e,#facc15);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase}
    .lead{font-size:clamp(1.15rem,3vw,1.55rem);color:var(--muted);font-weight:800;max-width:820px}.grid{display:grid;gap:20px}.two{grid-template-columns:1.1fr .9fr}section{padding:28px 0}.panel{border:1px solid var(--line);border-radius:28px;background:rgba(15,23,42,.72);padding:22px}.panel h2{margin:0 0 14px;font-size:clamp(1.8rem,5vw,3rem);line-height:1;font-weight:1000}.muted{color:var(--muted);font-weight:750}
    label{display:block;text-transform:uppercase;letter-spacing:.18em;color:var(--cyan);font-size:.78rem;font-weight:1000;margin:0 0 8px}input,textarea,select{width:100%;border:1px solid rgba(255,255,255,.16);border-radius:18px;background:rgba(0,0,0,.38);color:white;padding:15px;font-size:1rem;outline:none}textarea{min-height:150px;resize:vertical}
    .stack{display:grid;gap:16px}.primary{background:var(--cyan);color:#020617;border-color:transparent}.danger{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.35)}.row{display:flex;gap:10px;flex-wrap:wrap}.tiny{font-size:.9rem;color:#94a3b8;font-weight:800}.prompt{min-height:88px;display:grid;align-content:center;color:#e2e8f0;font-weight:900}
    @media(max-width:850px){.two{grid-template-columns:1fr}h1{font-size:3rem}}
  </style>
</head>
<body>
<header class="top"><nav class="wrap"><div class="brand">🎨 EMME'S STUDIO</div><div class="links"><a href="../">Hub</a><a href="../kai/">Kai</a></div></nav></header>
<main class="wrap">
<section class="hero"><div class="card"><h1>Emme's Studio District</h1><p class="lead">A darker, pretty, actually-useful high-school creative page with a local-save journal and prompt machine.</p></div></section>
<section class="grid two"><div class="panel stack"><h2>📓 Interactive Journal</h2><div><label for="mood">Current Mood</label><input id="mood"></div><div><label for="entry">Journal Entry</label><textarea id="entry"></textarea></div><div><label for="goals">Tiny Goal List</label><textarea id="goals"></textarea></div><div class="row"><button class="primary" onclick="saveJournal()">💾 Save</button><button onclick="loadJournal()">📂 Load</button><button class="danger" onclick="clearJournal()">🧹 Reset</button></div><p id="saveStatus" class="tiny">Status: ready.</p></div><div class="panel stack"><h2>✨ Prompt Generator</h2><select id="promptType"><option>Story prompt</option><option>Art prompt</option><option>Character idea</option></select><button class="primary" onclick="makePrompt()">Generate</button><div id="promptBox" class="panel prompt">Prompt appears here.</div></div></section>
</main>
<script>
const STORAGE_KEY='better-kids-webspace-emme';
const prompts={"Story prompt":["A hallway becomes a train station at midnight.","A playlist opens memories."],"Art prompt":["A neon greenhouse over an abandoned mall.","A moss planet full of mirrors."],"Character idea":["A girl who photographs forgotten dreams.","A teenager who collects hidden sounds."]};
function status(m){document.getElementById('saveStatus').textContent='Status: '+m}
function saveJournal(){const data={mood:mood.value,entry:entry.value,goals:goals.value};localStorage.setItem(STORAGE_KEY,JSON.stringify(data));status('saved locally')}
function loadJournal(){const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return status('nothing saved');const data=JSON.parse(raw);mood.value=data.mood||'';entry.value=data.entry||'';goals.value=data.goals||'';status('loaded')}
function clearJournal(){localStorage.removeItem(STORAGE_KEY);mood.value='';entry.value='';goals.value='';status('reset complete')}
function makePrompt(){const type=promptType.value;const list=prompts[type];promptBox.textContent=list[Math.floor(Math.random()*list.length)]}
loadJournal();
</script>
</body>
</html>
